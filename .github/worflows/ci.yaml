name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar con Maven
        run: mvn -B clean package --file pom.xml

      # --- NUEVOS PASOS PARA DOCKER ---

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx es un plugin de Docker que mejora la velocidad y características de construcción

      - name: Construir la imagen Docker
        run: |
          docker build -t mi-app-java:${{ github.sha }} .
        # ${{ github.sha }} usa el ID único del commit como etiqueta (tag) de la imagen.
        # Esto es una excelente práctica para saber exactamente qué versión del código está en cada imagen.